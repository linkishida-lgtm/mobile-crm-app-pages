<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>案件進捗CRM</title>
  <meta name="description" content="案件進捗CRMのサポート情報とプライバシーポリシーです。">
  <style>
    :root { color-scheme: light; --bg: #f6f8fb; --panel: #fff; --text: #182230; --muted: #5d6b82; --line: #d8dee8; --accent: #1769aa; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
    main { max-width: 880px; margin: 0 auto; padding: 48px 20px 64px; }
    header { border-bottom: 1px solid var(--line); margin-bottom: 32px; padding-bottom: 24px; }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 6vw, 3.2rem); line-height: 1.15; }
    h2 { margin-top: 0; font-size: 1.25rem; }
    p { margin: 0 0 16px; }
    a { color: var(--accent); font-weight: 700; }
    .lead { color: var(--muted); font-size: 1.08rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 20px; }
    footer { color: var(--muted); font-size: .92rem; margin-top: 36px; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>案件進捗CRM</h1>
      <p class="lead">顧客、案件、スケジュール、売上メモをスマートフォンで管理するためのCRMアプリです。</p>
    </header>
    <section class="grid" aria-label="関連ページ">
      <article class="card">
        <h2>サポート</h2>
        <p>使い方、データの削除、問い合わせ先について確認できます。</p>
        <p><a href="support.html">サポートページを見る</a></p>
      </article>
      <article class="card">
        <h2>プライバシーポリシー</h2>
        <p>アプリ内で扱うデータ、保存場所、第三者提供の有無を確認できます。</p>
        <p><a href="privacy-policy.html">プライバシーポリシーを見る</a></p>
      </article>
    </section>
    <footer>
      <p>運用者: linkishida-lgtm</p>
      <p>最終更新日: 2026年6月13日</p>
    </footer>
  </main>
</body>
</html>
